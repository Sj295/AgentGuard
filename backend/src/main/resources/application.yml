server:
  port: 8080

spring:
  application:
    name: agentguard-backend
  datasource:
    url: ${AGENTGUARD_DB_URL:jdbc:mysql://localhost:3306/agentguard?useUnicode=true&characterEncoding=UTF-8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true}
    username: ${AGENTGUARD_DB_USERNAME:root}
    password: ${AGENTGUARD_DB_PASSWORD:}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      initialization-fail-timeout: -1
  data:
    redis:
      host: ${AGENTGUARD_REDIS_HOST:localhost}
      port: ${AGENTGUARD_REDIS_PORT:6379}
      username: ${AGENTGUARD_REDIS_USERNAME:}
      password: ${AGENTGUARD_REDIS_PASSWORD:}
      timeout: 3000ms
  ai:
    model:
      chat: none
      embedding: none
      image: none
      moderation: none
      audio:
        speech: none
        transcription: none
    openai:
      api-key: ${AGENTGUARD_AI_API_KEY:}
      base-url: ${AGENTGUARD_AI_BASE_URL:https://api.deepseek.com}
      chat:
        completions-path: /chat/completions
        options:
          model: ${AGENTGUARD_AI_MODEL:deepseek-chat}
          temperature: 0.2

mybatis-plus:
  mapper-locations: classpath*:mapper/**/*.xml
  configuration:
    map-underscore-to-camel-case: true
  global-config:
    db-config:
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

agentguard:
  redis:
    enabled: ${AGENTGUARD_REDIS_ENABLED:false}
  ai:
    enabled: false
    provider: spring-ai-openai-compatible
    base-url: ${AGENTGUARD_AI_BASE_URL:https://api.deepseek.com}
    api-key: ${AGENTGUARD_AI_API_KEY:}
    model: ${AGENTGUARD_AI_MODEL:deepseek-chat}
    timeout-seconds: 30
    mock-on-empty-key: true
    rate-limit:
      enabled: ${AGENTGUARD_AI_RATE_LIMIT_ENABLED:false}
      per-minute: ${AGENTGUARD_AI_RATE_LIMIT_PER_MINUTE:10}
      per-day: ${AGENTGUARD_AI_RATE_LIMIT_PER_DAY:200}
    cache:
      enabled: ${AGENTGUARD_AI_CACHE_ENABLED:false}
      ttl-seconds: ${AGENTGUARD_AI_CACHE_TTL_SECONDS:3600}
